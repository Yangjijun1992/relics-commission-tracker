name: Validate Commission Data

on:
  push:
    paths:
      - 'data/commission.json'
  pull_request:
    paths:
      - 'data/commission.json'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Validate commission.json
        run: python scripts/validate_commission.py
