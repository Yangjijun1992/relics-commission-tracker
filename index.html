<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RELICS Commission Run Tracker</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent-blue: #3b82f6;
      --accent-green: #22c55e;
      --accent-yellow: #eab308;
      --accent-red: #ef4444;
      --accent-purple: #a855f7;
      --accent-cyan: #06b6d4;
      --border-color: #334155;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
      border-bottom: 1px solid var(--border-color);
      padding: 1.5rem 2rem;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .header .subtitle {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    .header .meta {
      display: flex;
      gap: 2rem;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .header .meta span { display: flex; align-items: center; gap: 0.35rem; }

    .header-actions {
      display: flex; gap: 0.5rem; margin-top: 0.75rem;
    }

    .header-actions button {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .header-actions button:hover {
      border-color: var(--accent-blue);
      background: rgba(59,130,246,0.1);
    }

    .header-actions button.export-btn {
      border-color: var(--accent-green);
      color: var(--accent-green);
    }

    .header-actions button.export-btn:hover {
      background: rgba(34,197,94,0.1);
    }

    .header-actions button.import-btn {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .header-actions button.import-btn:hover {
      background: rgba(6,182,212,0.1);
    }

    #import-file { display: none; }

    .github-config {
      display: none;
      margin-top: 0.75rem;
      padding: 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
    }

    .github-config.show { display: block; }

    .github-config label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 0.2rem;
    }

    .github-config input {
      width: 100%;
      padding: 0.35rem 0.6rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 0.8rem;
      margin-bottom: 0.6rem;
      font-family: inherit;
    }

    .github-config input:focus { outline: none; border-color: var(--accent-blue); }

    .github-config .config-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .github-config .btn-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.4rem;
    }

    .github-config button {
      padding: 0.35rem 0.8rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 0.8rem;
      cursor: pointer;
    }

    .github-config button:hover { border-color: var(--accent-blue); }

    .github-config .save-cfg { border-color: var(--accent-green); color: var(--accent-green); }

    .header-actions .push-btn {
      border-color: var(--accent-purple);
      color: var(--accent-purple);
      font-weight: 600;
    }

    .header-actions .push-btn:hover {
      background: rgba(168,85,247,0.1);
    }

    .header-actions .push-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .push-status {
      font-size: 0.75rem;
      margin-top: 0.3rem;
      color: var(--text-secondary);
    }

    .push-status.ok { color: var(--accent-green); }
    .push-status.err { color: var(--accent-red); }

    .summary-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border-color);
    }

    .summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
    }

    .summary-card .label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .summary-card .value { font-size: 1.75rem; font-weight: 700; }
    .summary-card .value.green { color: var(--accent-green); }
    .summary-card .value.yellow { color: var(--accent-yellow); }
    .summary-card .value.red { color: var(--accent-red); }
    .summary-card .value.blue { color: var(--accent-blue); }

    .main { padding: 1.5rem 2rem; }

    .subsystem {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }

    .subsystem-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .subsystem-header:hover { background: rgba(255,255,255,0.03); }

    .subsystem-header .left { display: flex; align-items: center; gap: 1rem; flex: 1; min-width: 0; }

    .subsystem-header .indicator {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }

    .subsystem-header .info h2 { font-size: 1rem; font-weight: 600; }
    .subsystem-header .info .cn { font-size: 0.8rem; color: var(--text-secondary); }
    .subsystem-header .info .owner { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.15rem; display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }

    input.owner-input, input.sys-date-input {
      background: transparent;
      border: 1px solid transparent;
      color: var(--accent-cyan);
      border-radius: 3px;
      padding: 0.1rem 0.3rem;
      font-size: 0.75rem;
      font-family: inherit;
      width: auto;
      min-width: 60px;
    }

    input.owner-input { width: 100px; }
    input.sys-date-input { width: 95px; color: var(--text-secondary); }

    input.owner-input:hover, input.sys-date-input:hover { border-color: var(--border-color); }
    input.owner-input:focus, input.sys-date-input:focus { outline: none; border-color: var(--accent-blue); background: var(--bg-primary); }

    .subsystem-header .progress-area {
      display: flex; align-items: center; gap: 1rem; flex-shrink: 0;
    }

    .progress-bar-wrap {
      width: 200px; height: 8px; background: #334155; border-radius: 4px; overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%; border-radius: 4px; transition: width 0.4s ease;
    }

    .progress-text { font-size: 0.85rem; font-weight: 600; min-width: 3.5rem; text-align: right; }

    .toggle-icon {
      color: var(--text-secondary);
      transition: transform 0.2s;
      flex-shrink: 0;
      margin-left: 0.5rem;
    }

    .subsystem.open .toggle-icon { transform: rotate(180deg); }

    .subsystem-body {
      display: none;
      border-top: 1px solid var(--border-color);
    }

    .subsystem.open .subsystem-body { display: block; }

    .subtask-row {
      display: grid;
      grid-template-columns: 70px 1fr 125px 125px 100px 90px 90px 1fr;
      gap: 0.5rem;
      padding: 0.65rem 1.25rem;
      align-items: center;
      border-bottom: 1px solid rgba(51,65,85,0.5);
      font-size: 0.8rem;
    }

    .subtask-row:last-child { border-bottom: none; }

    .subtask-row .id { color: var(--text-secondary); font-family: monospace; font-size: 0.75rem; }
    .subtask-row .name { font-weight: 500; }
    .subtask-row .cn { color: var(--text-secondary); font-size: 0.75rem; }
    .subtask-row .date { color: var(--text-secondary); font-size: 0.75rem; }

    input.date-input {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      border-radius: 4px;
      padding: 0.2rem 0.3rem;
      font-size: 0.75rem;
      font-family: inherit;
      width: 110px;
      cursor: pointer;
    }

    input.date-input:focus { outline: none; border-color: var(--accent-blue); color: var(--text-primary); }
    input.date-input::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
    .subtask-row .assignee { color: var(--accent-cyan); font-size: 0.75rem; }

    .subtask-progress {
      display: flex; align-items: center; gap: 0.5rem;
    }

    .subtask-progress .bar {
      flex: 1; height: 6px; background: #334155; border-radius: 3px; overflow: hidden;
    }

    .subtask-progress .fill {
      height: 100%; border-radius: 3px; transition: width 0.3s;
    }

    .subtask-progress .pct { font-size: 0.75rem; min-width: 2.5rem; text-align: right; }

    .status-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
    }

    .status-not_started { background: rgba(100,116,139,0.2); color: #94a3b8; }
    .status-in_progress { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .status-blocked { background: rgba(239,68,68,0.2); color: #f87171; }
    .status-completed { background: rgba(34,197,94,0.2); color: #4ade80; }
    .status-delayed { background: rgba(234,179,8,0.2); color: #facc15; }

    .subtask-header {
      display: grid;
      grid-template-columns: 70px 1fr 125px 125px 100px 90px 90px 1fr;
      gap: 0.5rem;
      padding: 0.5rem 1.25rem;
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border-color);
      background: rgba(15,23,42,0.5);
    }

    .gantt-section {
      padding: 1.5rem 2rem;
    }

    .gantt-section h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }

    .gantt-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      overflow-x: auto;
      padding: 1rem;
    }

    .gantt-chart {
      min-width: 800px;
      position: relative;
    }

    .gantt-months {
      display: flex;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .gantt-months .month {
      flex: 1;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .gantt-row {
      display: flex;
      align-items: center;
      height: 28px;
      margin-bottom: 2px;
    }

    .gantt-label {
      width: 150px;
      font-size: 0.7rem;
      color: var(--text-secondary);
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gantt-bar-area {
      flex: 1;
      position: relative;
      height: 20px;
    }

    .gantt-bar {
      position: absolute;
      height: 16px;
      top: 2px;
      border-radius: 3px;
      min-width: 4px;
      opacity: 0.85;
    }

    .gantt-bar:hover { opacity: 1; }

    .legend {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    .notes-input {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 4px;
      padding: 0.2rem 0.4rem;
      font-size: 0.75rem;
      width: 100%;
      font-family: inherit;
    }

    .notes-input:focus {
      outline: none;
      border-color: var(--accent-blue);
    }

    input.task-name-input, input.task-cn-input, input.assignee-input {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-primary);
      border-radius: 3px;
      padding: 0.1rem 0.3rem;
      font-size: 0.8rem;
      font-family: inherit;
      width: 100%;
    }

    input.task-cn-input { font-size: 0.75rem; color: var(--text-secondary); }
    input.assignee-input { color: var(--accent-cyan); font-size: 0.75rem; width: 100%; }

    input.task-name-input:hover, input.task-cn-input:hover, input.assignee-input:hover { border-color: var(--border-color); }
    input.task-name-input:focus, input.task-cn-input:focus, input.assignee-input:focus {
      outline: none; border-color: var(--accent-blue); background: var(--bg-primary);
    }

    .add-task-row {
      display: flex;
      justify-content: center;
      padding: 0.6rem;
      border-top: 1px solid var(--border-color);
    }

    .add-task-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.35rem 0.9rem;
      border: 1px dashed var(--border-color);
      border-radius: 0.5rem;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .add-task-btn:hover { border-color: var(--accent-green); color: var(--accent-green); }

    .del-task-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0.15rem;
      border-radius: 3px;
      font-size: 0.85rem;
      line-height: 1;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .del-task-btn:hover { color: var(--accent-red); background: rgba(239,68,68,0.1); }

    select.status-select {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 4px;
      padding: 0.2rem 0.3rem;
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
    }

    select.status-select:focus { outline: none; border-color: var(--accent-blue); }
    select.status-select option { background: #1e293b; }

    input.progress-input {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 4px;
      padding: 0.2rem 0.3rem;
      font-size: 0.75rem;
      width: 50px;
      text-align: right;
      font-family: inherit;
    }

    input.progress-input:focus { outline: none; border-color: var(--accent-blue); }

    .footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
      font-size: 0.75rem;
      border-top: 1px solid var(--border-color);
    }

    @media (max-width: 900px) {
      .subtask-row, .subtask-header {
        grid-template-columns: 50px 1fr 80px;
      }
      .subtask-row > *:nth-child(n+4) { display: none; }
      .subtask-header > *:nth-child(n+4) { display: none; }
      .progress-bar-wrap { width: 120px; }
      .header .meta { flex-wrap: wrap; gap: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>RELICS Commission Run Tracker</h1>
    <div class="subtitle">RELICS 实验 Commission Run 进度跟踪</div>
    <div class="meta">
      <span>PI: <strong id="pi-name">Loading...</strong></span>
      <span>周期: <strong id="date-range">--</strong></span>
      <span>更新: <strong id="last-updated">--</strong></span>
    </div>
    <div class="header-actions">
      <button class="export-btn" onclick="exportJSON()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 011 12.25v-2.5a.75.75 0 011.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 00.25-.25v-2.5a.75.75 0 011.5 0v2.5A1.75 1.75 0 0113.25 14H2.75z"/><path d="M7.25 7.689V2a.75.75 0 011.5 0v5.689l1.97-1.969a.749.749 0 111.06 1.06l-3.25 3.25a.749.749 0 01-1.06 0L4.22 6.78a.749.749 0 111.06-1.06l1.97 1.969z"/></svg>
        Export JSON
      </button>
      <button class="import-btn" onclick="document.getElementById('import-file').click()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 011 12.25v-2.5a.75.75 0 011.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 00.25-.25v-2.5a.75.75 0 011.5 0v2.5A1.75 1.75 0 0113.25 14H2.75z"/><path d="M8.75 1.75a.75.75 0 00-1.5 0v5.689L5.28 5.47a.749.749 0 10-1.06 1.06l3.25 3.25a.749.749 0 001.06 0l3.25-3.25a.749.749 0 10-1.06-1.06l-1.97 1.969V1.75z"/></svg>
        Import JSON
      </button>
      <input type="file" id="import-file" accept=".json" onchange="importJSON(event)">
      <button class="push-btn" onclick="toggleGithubConfig()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 01-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 010 8c0-4.42 3.58-8 8-8z"/></svg>
        Push to GitHub
      </button>
    </div>
    <div class="github-config" id="github-config">
      <div class="config-row">
        <div>
          <label>GitHub Token (PAT)</label>
          <input type="password" id="gh-token" placeholder="ghp_xxxx or github_pat_xxxx">
        </div>
        <div>
          <label>Commit Message</label>
          <input type="text" id="gh-commit-msg" value="update commission progress" placeholder="commit message">
        </div>
      </div>
      <div class="config-row">
        <div>
          <label>Owner / Repo</label>
          <input type="text" id="gh-owner-repo" placeholder="Yangjijun1992/relics-commission-tracker">
        </div>
        <div>
          <label>Branch</label>
          <input type="text" id="gh-branch" value="main" placeholder="main">
        </div>
      </div>
      <div class="btn-row">
        <button class="save-cfg" onclick="saveGithubConfig()">Save Config</button>
        <button onclick="pushToGitHub()" id="push-now-btn">Push Now</button>
      </div>
      <div class="push-status" id="push-status"></div>
    </div>
  </div>

  <div class="summary-bar" id="summary"></div>

  <div class="main" id="subsystem-list"></div>

  <div class="gantt-section">
    <h2>Gantt Timeline</h2>
    <div class="gantt-container">
      <div class="gantt-chart" id="gantt-chart"></div>
    </div>
    <div class="legend" id="gantt-legend"></div>
  </div>

  <div class="footer">RELICS Commission Run Tracker | Generated by project automation</div>

  <script>
    const COLORS = ['#3b82f6','#22c55e','#a855f7','#eab308','#ef4444','#06b6d4','#f97316','#ec4899'];

    let data = null;

    async function loadData() {
      try {
        const resp = await fetch('data/commission.json?' + Date.now());
        data = await resp.json();
      } catch (e) {
        console.error('Failed to load commission.json:', e);
        return;
      }
      render();
    }

    function render() {
      renderSummary();
      renderSubsystems();
      renderGantt();
    }

    function getSubsystemProgress(sys) {
      if (!sys.subtasks || sys.subtasks.length === 0) return 0;
      return Math.round(sys.subtasks.reduce((s, t) => s + t.progress, 0) / sys.subtasks.length);
    }

    function getOverallStats() {
      let total = 0, completed = 0, inProgress = 0, blocked = 0, delayed = 0;
      data.subsystems.forEach(sys => {
        sys.subtasks.forEach(t => {
          total++;
          if (t.status === 'completed') completed++;
          else if (t.status === 'in_progress') inProgress++;
          else if (t.status === 'blocked') blocked++;
          else if (t.status === 'delayed') delayed++;
        });
      });
      return { total, completed, inProgress, blocked, delayed };
    }

    function renderSummary() {
      const stats = getOverallStats();
      const overallProgress = Math.round(
        data.subsystems.reduce((s, sys) => s + getSubsystemProgress(sys), 0) / data.subsystems.length
      );
      document.getElementById('pi-name').textContent = data.project.pi;
      document.getElementById('date-range').textContent = data.project.start_date + ' ~ ' + data.project.end_date;
      document.getElementById('last-updated').textContent = data.last_updated;

      document.getElementById('summary').innerHTML = `
        <div class="summary-card">
          <div class="label">Overall Progress</div>
          <div class="value blue">${overallProgress}%</div>
        </div>
        <div class="summary-card">
          <div class="label">Total Tasks</div>
          <div class="value">${stats.total}</div>
        </div>
        <div class="summary-card">
          <div class="label">Completed</div>
          <div class="value green">${stats.completed}</div>
        </div>
        <div class="summary-card">
          <div class="label">In Progress</div>
          <div class="value blue">${stats.inProgress}</div>
        </div>
        <div class="summary-card">
          <div class="label">Blocked</div>
          <div class="value red">${stats.blocked}</div>
        </div>
        <div class="summary-card">
          <div class="label">Delayed</div>
          <div class="value yellow">${stats.delayed}</div>
        </div>
        <div class="summary-card">
          <div class="label">Subsystems</div>
          <div class="value">${data.subsystems.length}</div>
        </div>
      `;
    }

    function getProgressColor(pct) {
      if (pct >= 80) return 'var(--accent-green)';
      if (pct >= 40) return 'var(--accent-yellow)';
      if (pct > 0) return 'var(--accent-blue)';
      return '#475569';
    }

    function getIndicatorColor(pct) {
      if (pct >= 80) return 'var(--accent-green)';
      if (pct >= 40) return 'var(--accent-yellow)';
      if (pct > 0) return 'var(--accent-blue)';
      return '#475569';
    }

    function renderSubsystems() {
      const container = document.getElementById('subsystem-list');
      container.innerHTML = '';

      data.subsystems.forEach((sys, si) => {
        const prog = getSubsystemProgress(sys);
        const div = document.createElement('div');
        div.className = 'subsystem';
        div.innerHTML = `
          <div class="subsystem-header" onclick="this.parentElement.classList.toggle('open')">
            <div class="left">
              <div class="indicator" style="background:${getIndicatorColor(prog)}"></div>
              <div class="info">
                <h2>${sys.name}</h2>
                <div class="cn">${sys.name_cn}</div>
                <div class="owner">
                  Responsible: <input class="owner-input" value="${sys.responsible}"
                    onchange="updateSubsystem('${sys.id}','responsible',this.value)">
                  | <input type="date" class="sys-date-input" value="${sys.planned_start}"
                    onchange="updateSubsystem('${sys.id}','planned_start',this.value)">
                  ~ <input type="date" class="sys-date-input" value="${sys.planned_end}"
                    onchange="updateSubsystem('${sys.id}','planned_end',this.value)">
                </div>
              </div>
            </div>
            <div class="progress-area">
              <div class="progress-bar-wrap">
                <div class="progress-bar-fill" style="width:${prog}%;background:${getProgressColor(prog)}"></div>
              </div>
              <div class="progress-text" style="color:${getProgressColor(prog)}">${prog}%</div>
            </div>
            <div class="toggle-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M4.427 6.427l3.396 3.396a.25.25 0 00.354 0l3.396-3.396A.25.25 0 0011.396 6H4.604a.25.25 0 00-.177.427z"/>
              </svg>
            </div>
          </div>
          <div class="subsystem-body">
            <div class="subtask-header">
              <div>ID</div>
              <div>Task</div>
              <div>Start</div>
              <div>End</div>
              <div>Assignee</div>
              <div>Status</div>
              <div>Progress</div>
              <div>Notes</div>
            </div>
            ${sys.subtasks.map(t => `
              <div class="subtask-row" data-id="${t.id}">
                <div class="id" style="display:flex;align-items:center;gap:0.3rem">
                  <button class="del-task-btn" title="Delete" onclick="deleteTask('${sys.id}','${t.id}')">&times;</button>
                  <span>${t.id}</span>
                </div>
                <div>
                  <input class="task-name-input" value="${t.name}" placeholder="Task name"
                    onchange="updateTask('${sys.id}','${t.id}','name',this.value)">
                  <input class="task-cn-input" value="${t.name_cn}" placeholder="中文名"
                    onchange="updateTask('${sys.id}','${t.id}','name_cn',this.value)">
                </div>
                <div><input type="date" class="date-input" value="${t.planned_start}"
                  onchange="updateTask('${sys.id}','${t.id}','planned_start',this.value)"></div>
                <div><input type="date" class="date-input" value="${t.planned_end}"
                  onchange="updateTask('${sys.id}','${t.id}','planned_end',this.value)"></div>
                <div><input class="assignee-input" value="${t.assignee}" placeholder="TBD"
                  onchange="updateTask('${sys.id}','${t.id}','assignee',this.value)"></div>
                <div>
                  <select class="status-select" onchange="updateTask('${sys.id}','${t.id}','status',this.value)">
                    <option value="not_started" ${t.status==='not_started'?'selected':''}>Not Started</option>
                    <option value="in_progress" ${t.status==='in_progress'?'selected':''}>In Progress</option>
                    <option value="completed" ${t.status==='completed'?'selected':''}>Completed</option>
                    <option value="blocked" ${t.status==='blocked'?'selected':''}>Blocked</option>
                    <option value="delayed" ${t.status==='delayed'?'selected':''}>Delayed</option>
                  </select>
                </div>
                <div class="subtask-progress">
                  <input type="range" min="0" max="100" value="${t.progress}"
                    style="width:60px;accent-color:${getProgressColor(t.progress)}"
                    oninput="updateTask('${sys.id}','${t.id}','progress',+this.value);this.nextElementSibling.textContent=this.value+'%';this.previousElementSibling&&0">
                  <input type="number" class="progress-input" min="0" max="100" value="${t.progress}"
                    onchange="updateTask('${sys.id}','${t.id}','progress',+this.value);this.parentElement.querySelector('input[type=range]').value=this.value">
                </div>
                <div><input class="notes-input" value="${t.notes||''}" placeholder="Notes..."
                  onchange="updateTask('${sys.id}','${t.id}','notes',this.value)"></div>
              </div>
            `).join('')}
            <div class="add-task-row">
              <button class="add-task-btn" onclick="addTask('${sys.id}')">+ Add Subtask</button>
            </div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function updateTask(sysId, taskId, field, value) {
      const sys = data.subsystems.find(s => s.id === sysId);
      if (!sys) return;
      const task = sys.subtasks.find(t => t.id === taskId);
      if (!task) return;
      task[field] = value;
      data.last_updated = new Date().toISOString().slice(0,19);
      renderSummary();
      renderGantt();
      saveData();
    }

    function updateSubsystem(sysId, field, value) {
      const sys = data.subsystems.find(s => s.id === sysId);
      if (!sys) return;
      sys[field] = value;
      data.last_updated = new Date().toISOString().slice(0,19);
      renderSummary();
      renderGantt();
      saveData();
    }

    function addTask(sysId) {
      const sys = data.subsystems.find(s => s.id === sysId);
      if (!sys) return;
      const idx = sys.subtasks.length + 1;
      const prefix = sys.id.replace('-', '');
      const newTask = {
        id: `${sys.id}-${String(idx).padStart(2,'0')}`,
        name: 'New Task',
        name_cn: '新任务',
        planned_start: sys.planned_start,
        planned_end: sys.planned_start,
        status: 'not_started',
        progress: 0,
        assignee: 'TBD',
        notes: ''
      };
      sys.subtasks.push(newTask);
      data.last_updated = new Date().toISOString().slice(0,19);
      render();
      saveData();
    }

    function deleteTask(sysId, taskId) {
      if (!confirm('Delete this subtask?')) return;
      const sys = data.subsystems.find(s => s.id === sysId);
      if (!sys) return;
      sys.subtasks = sys.subtasks.filter(t => t.id !== taskId);
      data.last_updated = new Date().toISOString().slice(0,19);
      render();
      saveData();
    }

    function saveData() {
      localStorage.setItem('relics_commission_data', JSON.stringify(data));
      document.getElementById('last-updated').textContent = data.last_updated;
    }

    function exportJSON() {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'commission.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (!imported.subsystems) { alert('Invalid JSON: missing subsystems'); return; }
          data = imported;
          localStorage.setItem('relics_commission_data', JSON.stringify(data));
          render();
          alert('Import successful!');
        } catch (err) {
          alert('JSON parse error: ' + err.message);
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    function toggleGithubConfig() {
      document.getElementById('github-config').classList.toggle('show');
    }

    function saveGithubConfig() {
      const cfg = {
        token: document.getElementById('gh-token').value,
        ownerRepo: document.getElementById('gh-owner-repo').value,
        branch: document.getElementById('gh-branch').value,
        commitMsg: document.getElementById('gh-commit-msg').value,
      };
      localStorage.setItem('relics_gh_config', JSON.stringify(cfg));
      document.getElementById('push-status').textContent = 'Config saved!';
      document.getElementById('push-status').className = 'push-status ok';
    }

    function loadGithubConfig() {
      const raw = localStorage.getItem('relics_gh_config');
      if (!raw) return null;
      return JSON.parse(raw);
    }

    async function pushToGitHub() {
      const cfg = loadGithubConfig();
      if (!cfg || !cfg.token || !cfg.ownerRepo) {
        document.getElementById('push-status').textContent = 'Please fill and save config first.';
        document.getElementById('push-status').className = 'push-status err';
        toggleGithubConfig();
        return;
      }

      const [owner, repo] = cfg.ownerRepo.split('/');
      if (!owner || !repo) {
        document.getElementById('push-status').textContent = 'Invalid owner/repo format.';
        document.getElementById('push-status').className = 'push-status err';
        return;
      }

      const branch = cfg.branch || 'main';
      const filePath = 'data/commission.json';
      const statusEl = document.getElementById('push-status');
      const btn = document.getElementById('push-now-btn');

      btn.disabled = true;
      statusEl.textContent = 'Pushing...';
      statusEl.className = 'push-status';

      try {
        const headers = {
          'Authorization': 'token ' + cfg.token,
          'Accept': 'application/vnd.github.v3+json',
        };

        // Step 1: Get current file SHA
        const getUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}?ref=${branch}`;
        const getResp = await fetch(getUrl, { headers });
        let sha = null;
        if (getResp.ok) {
          const fileInfo = await getResp.json();
          sha = fileInfo.sha;
        } else if (getResp.status !== 404) {
          throw new Error(`GET failed (${getResp.status}): ${(await getResp.json()).message}`);
        }

        // Step 2: Create/update file
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
        const body = {
          message: cfg.commitMsg || 'update commission progress',
          content: content,
          branch: branch,
        };
        if (sha) body.sha = sha;

        const putResp = await fetch(
          `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`,
          { method: 'PUT', headers: { ...headers, 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
        );

        if (putResp.ok) {
          const result = await putResp.json();
          statusEl.textContent = 'Pushed! Commit: ' + result.commit.sha.slice(0, 7);
          statusEl.className = 'push-status ok';
        } else {
          const err = await putResp.json();
          throw new Error(`PUT failed (${putResp.status}): ${err.message}`);
        }
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
        statusEl.className = 'push-status err';
      } finally {
        btn.disabled = false;
      }
    }

    // Load saved GitHub config on startup
    window.addEventListener('DOMContentLoaded', () => {
      const cfg = loadGithubConfig();
      if (cfg) {
        if (cfg.token) document.getElementById('gh-token').value = cfg.token;
        if (cfg.ownerRepo) document.getElementById('gh-owner-repo').value = cfg.ownerRepo;
        if (cfg.branch) document.getElementById('gh-branch').value = cfg.branch;
        if (cfg.commitMsg) document.getElementById('gh-commit-msg').value = cfg.commitMsg;
      }
    });

    function renderGantt() {
      const chart = document.getElementById('gantt-chart');
      const legendEl = document.getElementById('gantt-legend');

      const allDates = [];
      data.subsystems.forEach(sys => {
        allDates.push(new Date(sys.planned_start));
        allDates.push(new Date(sys.planned_end));
        sys.subtasks.forEach(t => {
          allDates.push(new Date(t.planned_start));
          allDates.push(new Date(t.planned_end));
        });
      });

      const minDate = new Date(Math.min(...allDates));
      const maxDate = new Date(Math.max(...allDates));
      minDate.setDate(1);
      maxDate.setMonth(maxDate.getMonth() + 1, 0);

      const totalDays = (maxDate - minDate) / (1000 * 60 * 60 * 24);

      const months = [];
      const d = new Date(minDate);
      while (d <= maxDate) {
        months.push(d.toLocaleString('en', { month: 'short', year: '2-digit' }));
        d.setMonth(d.getMonth() + 1);
      }

      const monthsHtml = '<div class="gantt-months">' + months.map(m => `<div class="month">${m}</div>`).join('') + '</div>';

      const rowsHtml = data.subsystems.map((sys, si) => {
        const color = COLORS[si % COLORS.length];
        const sysStart = new Date(sys.planned_start);
        const sysEnd = new Date(sys.planned_end);
        const left = ((sysStart - minDate) / (totalDays * 86400000)) * 100;
        const width = ((sysEnd - sysStart) / (totalDays * 86400000)) * 100;

        let taskRows = sys.subtasks.map(t => {
          const tStart = new Date(t.planned_start);
          const tEnd = new Date(t.planned_end);
          const tl = ((tStart - minDate) / (totalDays * 86400000)) * 100;
          const tw = ((tEnd - tStart) / (totalDays * 86400000)) * 100;
          const prog = t.progress / 100;
          return `
            <div class="gantt-row">
              <div class="gantt-label">${t.id}</div>
              <div class="gantt-bar-area">
                <div class="gantt-bar" style="left:${tl}%;width:${tw}%;background:${color};opacity:0.4"></div>
                <div class="gantt-bar" style="left:${tl}%;width:${tw*prog}%;background:${color}"></div>
              </div>
            </div>
          `;
        }).join('');

        return `
          <div class="gantt-row" style="margin-bottom:4px">
            <div class="gantt-label" style="font-weight:600;color:${color}">${sys.name}</div>
            <div class="gantt-bar-area">
              <div class="gantt-bar" style="left:${left}%;width:${width}%;background:${color};opacity:0.8;border-radius:4px"></div>
            </div>
          </div>
          ${taskRows}
        `;
      }).join('');

      chart.innerHTML = monthsHtml + rowsHtml;

      legendEl.innerHTML = data.subsystems.map((sys, si) =>
        `<div class="legend-item"><div class="legend-dot" style="background:${COLORS[si%COLORS.length]}"></div>${sys.name}</div>`
      ).join('');
    }

    loadData();
  </script>
</body>
</html>
